<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 運動科技鏡像平台</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1a5276;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            color: #555;
        }
        .status {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 15px;
            background-color: #2ecc71;
            color: white;
            border-radius: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to AI Sports Platform! 🏃‍♂️🔥</h1>
        <p>這是我們小組的期末專案主頁，Flask 樣版引擎已成功運行！</p>
        <div class="status">系統狀態：正常運作中</div>
    </div>
</body>
</html>
