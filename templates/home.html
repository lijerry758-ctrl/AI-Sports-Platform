<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cyber Coach - 全球運動科學診斷系統</title>
    <style>
        /* 🌌 賽博龐克宇宙深色底 */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #060b14;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(at 50% 20%, rgba(0, 242, 254, 0.15) 0px, transparent 50%),
                radial-gradient(at 80% 80%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
        }

        /* 🛡️ 核心儀表中央控制艙 */
        .welcome-card {
            background: rgba(17, 24, 39, 0.75);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(0, 242, 254, 0.2);
            border: 1px solid rgba(0, 242, 254, 0.25);
            backdrop-filter: blur(20px);
            max-width: 500px;
            width: 90%;
            text-align: center;
            position: relative;
        }

        /* ⚡ 能量核心裝飾線 */
        .welcome-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            border-radius: 0 0 4px 4px;
            box-shadow: 0 0 10px #00f2fe;
        }

        /* 🤖 賽博發光極客大標題 */
        h1 {
            font-size: 36px;
            font-weight: 800;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        .version-tag {
            display: inline-block;
            font-size: 11px;
            background: rgba(0, 242, 254, 0.15);
            color: #00f2fe;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: bold;
            border: 1px solid rgba(0, 242, 254, 0.3);
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        p {
            color: #9ca3af;
            font-size: 16px;
            line-height: 1.6;
            margin: 0 0 35px 0;
        }

        /* 🚀 核心大按鈕：啟動發射艙 */
        .btn-launch {
            display: inline-block;
            width: 85%;
            padding: 16px 0;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #ffffff;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        .btn-launch:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.6);
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .btn-launch:active {
            transform: translateY(-1px);
        }

        /* 📡 底層通訊協定文字 */
        .footer-protocol {
            margin-top: 30px;
            font-size: 12px;
            color: #4b5563;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <h1>AI Cyber Coach</h1>
        <div class="version-tag">PROTOCOL V2.5 - COMMERCIAL ACTIVE</div>
        
        <p>歡迎登入頂級運動姿態智慧診斷系統。<br>本機已成功與新加坡雲端數據中心同步，準備執行實時人體運動幾何邊界運算。</p>
        
        <a href="/detection" class="btn-launch">⚡ 啟動 AI 系統核心</a>
        
        <div class="footer-protocol">SYS_STATUS: READY // CLOUD_DB: CONNECTED</div>
    </div>

</body>
</html>
