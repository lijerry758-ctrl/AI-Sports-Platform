<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨平台 AI 智慧語音健身教練</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1e272e;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 640px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #00d2d3;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .control-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        select {
            padding: 10px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            background-color: #2f3542;
            color: #00d2d3;
            border: 2px solid #00d2d3;
            cursor: pointer;
        }
        .switch-container {
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-pause {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            background-color: #ffa502;
            color: white;
        }
        .btn-pause.running { background-color: #ffa502; }
        .btn-pause.paused { background-color: #2ed573; }
        .video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            background-color: #3d3d3d;
            border: 3px dashed #00d2d3;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        #webcam { display: none; }
        #output_canvas { width: 100%; height: auto; display: block; }
        .dashboard {
            background-color: #2f3542;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        .row { display: flex; justify-content: space-around; width: 100%; }
        .data-card { text-align: center; flex: 1; }
        .data-value { font-size: 24px; font-weight: bold; color: #ffff2e; margin-top: 5px; }
        .feedback-value {
            font-size: 22px;
            font-weight: bold;
            color: #00d2d3;
            background-color: #1e222b;
            padding: 12px;
            border-radius: 5px;
            margin-top: 5px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #ff4757;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            width: 80%;
            max-width: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI 智慧健身教練 (即時語音版)</h1>
        
        <div class="control-panel">
            <span style="font-weight: bold; color: #00d2d3;">目前偵測項目：</span>
            <select id="exercise-selector">
                <option value="深蹲 (Squat)">🏋️ 深蹲 (Squat)</option>
                <option value="伏地挺身 (Pushup)">💪 伏地挺身 (Pushup)</option>
                <option value="弓箭步 (Lunge)">🦵 弓箭步 (Lunge)</option>
                <option value="開合跳 (Jumping Jack)">✨ 開合跳</option>
                <option value="棒式支撐 (Plank)">🧘 棒式支撐</option>
                <option value="仰臥起坐 (Situp)">🔥 仰臥起坐</option>
                <option value="引體向上 (Pullup)">🧗 引體向上</option>
                <option value="波比跳 (Burpee)">💥 波比跳</option>
                <option value="啞鈴舉背 (Row)">🏋️ 啞鈴舉背</option>
                <option value="橋式 (Glute Bridge)">🍑 橋式</option>
            </select>

            <div class="switch-container">
                <input type="checkbox" id="voice-toggle" checked>
                <label for="voice-toggle">🔊 開啟語音</label>
            </div>

            <button id="pause-button" class="btn-pause running">⏸️ 暫停偵測</button>
        </div>

        <div class="video-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="output_canvas" width="640" height="480"></canvas>
        </div>

        <div class="dashboard">
            <div class="row">
                <div class="data-card">
                    <div>AI 判定狀態</div>
                    <div id="pose-status" class="data-value">相機啟動中...</div>
                </div>
                <div class="data-card">
                    <div>當前核心角度</div>
                    <div id="knee-angle" class="data-value">--°</div>
                </div>
            </div>
            <div class="data-card" style="width: 100%;">
                <div id="ai-feedback" class="feedback-value">等待偵測數據...</div>
            </div>
        </div>

        <a href="/" class="btn">返回主頁</a>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('pose-status');
        const angleText = document.getElementById('knee-angle');
        const feedbackText = document.getElementById('ai-feedback');
        const exerciseSelector = document.getElementById('exercise-selector');
        const voiceToggle = document.getElementById('voice-toggle');
        const pauseButton = document.getElementById('pause-button');

        let isPaused = false; 
        let lastAnalysisTime = 0;
        const ANALYSIS_INTERVAL = 300; 

        // 🚀 依據你的要求，將語音冷卻時間改為 3 秒（3000毫秒）
        let lastSpeakTime = 0;
        const SPEAK_INTERVAL = 3000; 

        let ttsHistory = {}; 

        exerciseSelector.addEventListener('change', () => {
            ttsHistory[exerciseSelector.value] = false; 
        });

        // 🔊 智慧語音過濾核心：精準控制「低一點」與「高一點」
        function speakFeedback(rawText, exerciseName) {
            if (!voiceToggle.checked || isPaused) return;

            const currentTime = Date.now();
            if (currentTime - lastSpeakTime > SPEAK_INTERVAL) {
                lastSpeakTime = currentTime;

                let finalText = rawText;

                if (!ttsHistory[exerciseName]) {
                    // 第一次異常：念詳細的溫柔白話文指引
                    ttsHistory[exerciseName] = true; 
                } else {
                    // 🚀 第二次之後的精簡提示：直接喊「低一點」或「高一點」
                    const match = rawText.match(/\d+/);
                    const degrees = match ? match[0] : "";
                    
                    if (rawText.includes("不足") || rawText.includes("不夠")) {
                        finalText = `小白，再低一點，還差 ${degrees} 度。`;
                    } else if (rawText.includes("過深") || rawText.includes("過低")) {
                        finalText = `太深了，再高一點。`;
                    } else if (rawText.includes("鏡頭太遠")) {
                        finalText = "請往前站。";
                    } else {
                        finalText = "低一點。";
                    }
                }

                const utterance = new SpeechSynthesisUtterance(finalText);
                utterance.lang = 'zh-TW';
                utterance.rate = 1.1;
                window.speechSynthesis.speak(utterance);
            }
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            
            if (isPaused) {
                canvasCtx.restore();
                return;
            }

            if (results.poseLandmarks) {
                statusText.innerText = "偵測到人體！";
                statusText.style.color = "#2ecc71";
                
                for (const landmark of results.poseLandmarks) {
                    const x = landmark.x * canvasElement.width;
                    const y = landmark.y * canvasElement.height;
                    canvasCtx.beginPath();
                    canvasCtx.arc(x, y, 5, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = '#ff4757';
                    canvasCtx.fill();
                }

                const landmarks = results.poseLandmarks;
                const selectedExercise = exerciseSelector.value;

                let p1, p2, p3;
                if (selectedExercise.includes("Pushup") || selectedExercise.includes("Plank") || selectedExercise.includes("伏地挺身") || selectedExercise.includes("棒式")) {
                    p1 = landmarks[12] || landmarks[11]; 
                    p2 = landmarks[14] || landmarks[13]; 
                    p3 = landmarks[16] || landmarks[15]; 
                } else {
                    p1 = landmarks[24] || landmarks[23]; 
                    p2 = landmarks[26] || landmarks[25]; 
                    p3 = landmarks[28] || landmarks[27]; 
                }

                const currentTime = Date.now();
                if (currentTime - lastAnalysisTime > ANALYSIS_INTERVAL) {
                    lastAnalysisTime = currentTime;

                    const payload = {
                        exercise: selectedExercise,
                        voice_enabled: voiceToggle.checked,
                        shoulder: landmarks[11] ? [landmarks[11].x, landmarks[11].y] : null,
                        hip: p1 ? [p1.x, p1.y] : null,
                        knee: p2 ? [p2.x, p2.y] : null,
                        ankle: p3 ? [p3.x, p3.y] : null
                    };

                    fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.error) return;

                        angleText.innerText = `${data.current_knee_angle}°`;
                        feedbackText.innerText = data.feedback || "姿勢非常標準，請繼續保持！";
                        
                        // 同步自動辨識動作到下拉選單
                        if (data.exercise_name) {
                            for (let i = 0; i < exerciseSelector.options.length; i++) {
                                if (exerciseSelector.options[i].value.includes(data.exercise_name)) {
                                    if (exerciseSelector.selectedIndex !== i) {
                                        exerciseSelector.selectedIndex = i;
                                    }
                                    break;
                                }
                            }
                        }

                        if (data.is_valid) {
                            feedbackText.style.color = "#2ecc71";
                            statusText.innerText = data.status;
                            statusText.style.color = "#2ecc71";
                        } else {
                            feedbackText.style.color = "#ff4757";
                            statusText.innerText = data.status;
                            statusText.style.color = "#ff4757";
                            
                            if (data.feedback) {
                                speakFeedback(data.feedback, exerciseSelector.value);
                            }
                        }
                    })
                    .catch(err => console.error("📡 通訊異常:", err));
                }

            } else {
                statusText.innerText = "尋找人體中...";
                statusText.style.color = "#ffff2e";
                angleText.innerText = "--°";
                feedbackText.innerText = "等待偵測數據...";
                feedbackText.style.color = "#00d2d3";
            }
            canvasCtx.restore();
        }

        pauseButton.addEventListener('click', () => {
            isPaused = !isPaused;
            if (isPaused) {
                pauseButton.innerText = "▶️ 恢復偵測";
                pauseButton.className = "btn-pause paused";
                statusText.innerText = "偵測已暫停";
                statusText.style.color = "#ffa502";
            } else {
                pauseButton.innerText = "⏸️ 暫停偵測";
                pauseButton.className = "btn-pause running";
                statusText.innerText = "恢復偵測中...";
                statusText.style.color = "#2ecc71";
            }
        });

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });
        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        pose.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 640,
            height: 480
        });
        camera.start();
    </script>
</body>
</html>
