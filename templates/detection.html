    // 🔊 科技感音效產生器
        function playPingSound(isCelebration = false) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (!isCelebration) {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.4);
            } else {
                [523.25, 659.25, 783.99, 1046.50].forEach((freq, index) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime + index * 0.1);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime + index * 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + index * 0.1 + 0.8);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime + index * 0.1);
                    osc.stop(audioCtx.currentTime + index * 0.1 + 0.8);
                });
            }
        }

        function syncWithBrain() {
            fetch('/api/get_current_counter')
            .then(res => res.json())
            .then(data => {
                countText.innerText = data.counter;
                if (data.mode === "seconds") {
                    counterTitle.innerText = "⏱️ 當前累計秒數";
                } else {
                    counterTitle.innerText = "🎯 當前累計次數";
                }
            });
        }
        syncWithBrain();

        function smoothLandmarks(currentLandmarks) {
            if (!landmarkHistory) landmarkHistory = [];
            landmarkHistory.push(currentLandmarks);
            if (landmarkHistory.length > SMOOTH_FRAMES) { landmarkHistory.shift(); }
            let smoothed = JSON.parse(JSON.stringify(currentLandmarks));
            for (let i = 0; i < smoothed.length; i++) {
                let sumX = 0, sumY = 0;
                for (let j = 0; j < landmarkHistory.length; j++) {
                    sumX += landmarkHistory[j][i].x;
                    sumY += landmarkHistory[j][i].y;
                }
                smoothed[i].x = sumX / landmarkHistory.length;
                smoothed[i].y = sumY / landmarkHistory.length;
            }
            return smoothed;
        }

        function speakFeedback(rawText) {
            if (!voiceToggle.checked || isPaused || isCelebrated) {
                if (isCelebrated && !window.speechSynthesis.speaking && rawText === "標準") {} 
                else if (!isCelebrated) { window.speechSynthesis.cancel(); }
                return;
            }
            if (rawText === "標準") {
                if (window.speechSynthesis.speaking) {
                    window.speechSynthesis.cancel(); 
                    const praise = new SpeechSynthesisUtterance("做得好");
                    praise.lang = 'zh-TW'; praise.rate = 1.3;
                    window.speechSynthesis.speak(praise);
                }
                return;
            }
            const currentTime = Date.now();
            if (currentTime - lastSpeakTime > SPEAK_INTERVAL) {
                lastSpeakTime = currentTime;
                let finalText = rawText;
                const match = rawText.match(/\d+/);
                const degrees = match ? match[0] : "";
                if (rawText.includes("不足") || rawText.includes("不夠")) {
                    finalText = `再低一點，還差 ${degrees} 度。`;
                } else if (rawText.includes("過深") || rawText.includes("過低") || rawText.includes("太深") || rawText.includes("太高")) {
                    finalText = `再高一點。`;
                }
                const utterance = new SpeechSynthesisUtterance(finalText);
                utterance.lang = 'zh-TW'; utterance.rate = 1.2; 
                window.speechSynthesis.speak(utterance);
            }
        }

        exerciseSelector.addEventListener('change', () => {
            fetch('/api/reset_counter', { method: 'POST' })
            .then(res => res.json())
            .then(data => { 
                countText.innerText = data.counter; 
                isCelebrated = false;
                updateExerciseGuide(); 
            });
        });

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            
            if (isPaused) { canvasCtx.restore(); return; }

            if (results.poseLandmarks) {
                const stableLandmarks = smoothLandmarks(results.poseLandmarks);
                for (const landmark of stableLandmarks) {
                    const x = landmark.x * canvasElement.width;
                    const y = landmark.y * canvasElement.height;
                    canvasCtx.beginPath(); canvasCtx.arc(x, y, 4, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = '#00f2fe'; canvasCtx.fill();
                }

                const selectedExercise = exerciseSelector.value;
                
                const sh = stableLandmarks[12] ? [stableLandmarks[12].x, stableLandmarks[12].y] : (stableLandmarks[11] ? [stableLandmarks[11].x, stableLandmarks[11].y] : null);
                const el = stableLandmarks[14] ? [stableLandmarks[14].x, stableLandmarks[14].y] : (stableLandmarks[13] ? [stableLandmarks[13].x, stableLandmarks[13].y] : null);
                const wr = stableLandmarks[16] ? [stableLandmarks[16].x, stableLandmarks[16].y] : (stableLandmarks[15] ? [stableLandmarks[15].x, stableLandmarks[15].y] : null);
                const hp = stableLandmarks[24] ? [stableLandmarks[24].x, stableLandmarks[24].y] : (stableLandmarks[23] ? [stableLandmarks[23].x, stableLandmarks[23].y] : null);
                const kn = stableLandmarks[26] ? [stableLandmarks[26].x, stableLandmarks[26].y] : (stableLandmarks[25] ? [stableLandmarks[25].x, stableLandmarks[25].y] : null);
                const ak = stableLandmarks[28] ? [stableLandmarks[28].x, stableLandmarks[28].y] : (stableLandmarks[27] ? [stableLandmarks[27].x, stableLandmarks[27].y] : null);

                const currentTime = Date.now();
                if (currentTime - lastAnalysisTime > ANALYSIS_INTERVAL) {
                    lastAnalysisTime = currentTime;

                    const payload = {
                        exercise: selectedExercise,
                        mode: document.getElementById('mode-selector').value, 
                        voice_enabled: voiceToggle.checked,
                        shoulder: sh, elbow: el, wrist: wr, hip: hp, knee: kn, ankle: ak
                    };

                    fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.error) return;

                        angleText.innerText = `${data.current_knee_angle}°`;
                        countText.innerText = data.counter;

                        const userTarget = parseInt(targetInput.value) || 10;
                        const currentMode = document.getElementById('mode-selector').value;

                        if (currentMode === "seconds" || data.exercise_type === "seconds") {
                            counterTitle.innerText = "⏱️ 當前累計秒數";
                        } else {
                            counterTitle.innerText = "🎯 當前累計次數";
                        }

                        if (data.counter >= userTarget && !isCelebrated) {
                            isCelebrated = true; 
                            window.speechSynthesis.cancel(); 
                            playPingSound(true); 
                            if (voiceToggle.checked) {
                                const unitStr = currentMode === "seconds" ? "秒" : "下";
                                const celebUtterance = new SpeechSynthesisUtterance(`恭喜達標！成功完成 ${userTarget} ${unitStr} 的 ${data.exercise_name}，任務挑戰成功！`);
                                celebUtterance.lang = 'zh-TW'; celebUtterance.rate = 1.1;
                                window.speechSynthesis.speak(celebUtterance);
                            }
                        } else if (data.play_ping && data.counter < userTarget) {
                            playPingSound(false); 
                        }

                        if (data.is_valid) {
                            feedbackText.innerText = "🔥 姿勢非常標準，請繼續保持！";
                            feedbackText.style.color = "#10b981"; 
                            statusText.innerText = data.status; statusText.style.color = "#10b981";
                            videoBox.style.border = "2px solid #10b981";
                            videoBox.style.boxShadow = "0 0 25px rgba(16, 185, 129, 0.6)";
                            if (data.feedback === "標準") speakFeedback("標準");
                        } else {
                            feedbackText.innerText = `⚠️ ${data.feedback}`;
                            feedbackText.style.color = "#ef4444"; 
                            statusText.innerText = data.status; statusText.style.color = "#ef4444";
                            videoBox.style.border = "2px solid #ef4444";
                            videoBox.style.boxShadow = "0 0 25px rgba(239, 68, 68, 0.6)";
                            if (data.feedback) speakFeedback(data.feedback);
                        }
                    })
                    .catch(err => console.error("📡 通訊異常:", err));
                }
            } else {
                statusText.innerText = "尋找人體中..."; statusText.style.color = "#6b7280";
                angleText.innerText = "--°";
                feedbackText.innerText = "等待分析核心幾何數據..."; feedbackText.style.color = "#00f2fe";
                videoBox.style.border = "2px solid #00f2fe";
                videoBox.style.boxShadow = "0 0 20px rgba(0, 242, 254, 0.25)";
            }
            canvasCtx.restore();
        }

        pauseButton.addEventListener('click', () => {
            isPaused = !isPaused;
            if (isPaused) {
                window.speechSynthesis.cancel(); 
                pauseButton.innerText = "▶️ 恢復偵測"; 
                pauseButton.className = "btn-pause paused";
                statusText.innerText = "偵測已暫停"; statusText.style.color = "#f59e0b";
                videoBox.style.border = "2px solid #f59e0b";
                videoBox.style.boxShadow = "0 0 20px rgba(245, 158, 11, 0.4)";
            } else {
                pauseButton.innerText = "⏸️ 暫停偵測"; 
                pauseButton.className = "btn-pause running";
                statusText.innerText = "恢復偵測中..."; statusText.style.color = "#10b981";
            }
        });

        resetButton.addEventListener('click', () => {
            fetch('/api/reset_counter', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                countText.innerText = "0";
                isCelebrated = false; 
                feedbackText.innerText = "數據已成功清空，重新開始計數。";
                feedbackText.style.color = "#00f2fe";
            });
        });

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults(onResults);

        const camera = new Camera(videoElement, { onFrame: async () => { await pose.send({image: videoElement}); }, width: 640, height: 480 });
        camera.start();    
    </script>
</body>
</html>
