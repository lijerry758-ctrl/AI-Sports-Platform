<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨平台 AI 智慧語音健身教練</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1e272e;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 640px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #00d2d3;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .control-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        select {
            padding: 10px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            background-color: #2f3542;
            color: #00d2d3;
            border: 2px solid #00d2d3;
            cursor: pointer;
        }
        .switch-container {
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-pause {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            background-color: #ffa502;
            color: white;
        }
        .btn-pause.running { background-color: #ffa502; }
        .btn-pause.paused { background-color: #2ed573; }
        .video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            background-color: #3d3d3d;
            border: 3px dashed #00d2d3;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        #webcam { display: none; }
        #output_canvas { width: 100%; height: auto; display: block; }
        .dashboard {
            background-color: #2f3542;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        .row { display: flex; justify-content: space-around; width: 100%; }
        .data-card { text-align: center; flex: 1; }
        .data-value { font-size: 24px; font-weight: bold; color: #ffff2e; margin-top: 5px; }
        .feedback-value {
            font-size: 22px;
            font-weight: bold;
            color: #00d2d3;
            background-color: #1e222b;
            padding: 12px;
            border-radius: 5px;
            margin-top: 5px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #ff4757;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            width: 80%;
            max-width: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI 智慧健身教練 (即時語音版)</h1>
        
        <div class="control-panel">
            <span style="font-weight: bold; color: #00d2d3;">目前偵測項目：</span>
            <select id="exercise-selector">
                <option value="深蹲 (Squat)">🏋️ 深蹲 (Squat)</option>
                <option value="伏地挺身 (Pushup)">💪 伏地挺身 (Pushup)</option>
                <option value="弓箭步 (Lunge)">🦵 弓箭步 (Lunge)</option>
                <option value="開合跳 (Jumping Jack)">✨ 開合跳</option>
                <option value="棒式支撐 (Plank)">🧘 棒式支撐</option>
                <option value="仰臥起坐 (Situp)">🔥 仰臥起坐</option>
                <option value="引體向上 (Pullup)">🧗 引體向上</option>
                <option value="波比跳 (Burpee)">💥 波比跳</option>
                <option value="啞鈴舉背 (Row)">🏋️ 啞鈴舉背</option>
                <option value="橋式 (Glute Bridge)">🍑 橋式</option>
            </select>

            <div class="switch-container">
                <input type="checkbox" id="voice-toggle" checked>
                <label for="voice-toggle">🔊 開啟語音</label>
            </div>

            <button id="pause-button" class="btn-pause running">⏸️ 暫停偵測</button>
        </div>

        <div class="video-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="output_canvas" width="640" height="480"></canvas>
        </div>

        <div class="dashboard">
            <div class="row">
                <div class="data-card">
                    <div>AI 判定狀態</div>
                    <div id="pose-status" class="data-value">相機啟動中...</div>
                </div>
                <div class="data-card">
                    <div>當前核心角度</div>
                    <div id="knee-angle" class="data-value">--°</div>
                </div>
            </div>
            <div class="data-card" style="width: 100%;">
                <div id="ai-feedback" class="feedback-value">等待偵測數據...</div>
            </div>
        </div>

        <a href="/" class="btn">返回主頁</a>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('pose-status');
        const angleText = document.getElementById('knee-angle');
        const feedbackText = document.getElementById('ai-feedback');
        const exerciseSelector = document.getElementById('exercise-selector');
        const voiceToggle = document.getElementById('voice-toggle');
        const pauseButton = document.getElementById('pause-button');

        let isPaused = false; 
        let lastAnalysisTime = 0;
        const ANALYSIS_INTERVAL = 300; 

        let lastSpeakTime = 0;
        const SPEAK_INTERVAL = 3000; 

        // 🚀 武器 A：初始化關節座標緩衝滑動矩陣（用來存前 3 幀的歷史數據）
        let landmarkHistory = [];
        const SMOOTH_FRAMES = 3; 

        // 🚀 武器 A：小白萬用平滑濾波器函數
        function smoothLandmarks(currentLandmarks) {
            landmarkHistory.push(currentLandmarks);
            if (landmarkHistory.length > SMOOTH_FRAMES) {
                landmarkHistory.shift(); // 丟掉最舊的一幀
            }

            // 用第一幀當作複製模板
            let smoothed = JSON.parse(JSON.stringify(currentLandmarks));
            
            // 將這 3 幀的每一個關節點的 X、Y 座標通通加起來平均
            for (let i = 0; i < smoothed.length; i++) {
                let sumX = 0, sumY = 0;
                for (let j = 0; j < landmarkHistory.length; j++) {
                    sumX += landmarkHistory[j][i].x;
                    sumY += landmarkHistory[j][i].y;
                }
                smoothed[i].x = sumX / landmarkHistory.length;
                smoothed[i].y = sumY / landmarkHistory.length;
            }
            return smoothed;
        }

        // 🔊 智慧型語音控制：新增「阻斷過期語音」功能
        function speakFeedback(rawText) {
            if (!voiceToggle.checked || isPaused) return;

            // 🚀 武器 C：如果後端判定「已經標準」了，立刻強制中斷所有正在排隊或朗讀中的錯誤警告！
            if (rawText === "標準") {
                if (window.speechSynthesis.speaking) {
                    window.speechSynthesis.cancel(); // 斬斷過期語音！
                    
                    // 貼心地輕聲讚賞一聲，代表現在姿勢很棒！
                    const praise = new SpeechSynthesisUtterance("做得好");
                    praise.lang = 'zh-TW';
                    praise.rate = 1.2;
                    window.speechSynthesis.speak(praise);
                }
                return;
            }

            const currentTime = Date.now();
            if (currentTime - lastSpeakTime > SPEAK_INTERVAL) {
                lastSpeakTime = currentTime;

                // 為了乾脆俐落，精簡化語音發音
                let finalText = rawText;
                const match = rawText.match(/\d+/);
                const degrees = match ? match[0] : "";
                
                if (rawText.includes("不足") || rawText.includes("不夠")) {
                    finalText = `小白再低一點，差 ${degrees} 度。`;
                } else if (rawText.includes("過深") || rawText.includes("過低")) {
                    finalText = `太深了，再高一點。`;
                }

                const utterance = new SpeechSynthesisUtterance(finalText);
                utterance.lang = 'zh-TW';
                utterance.rate = 1.2; // 語速稍微加快，聽起來更即時
                window.speechSynthesis.speak(utterance);
            }
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            
            if (isPaused) {
                canvasCtx.restore();
                return;
            }

            if (results.poseLandmarks) {
                statusText.innerText = "偵測到人體！";
                statusText.style.color = "#2ecc71";

                // 🚀 武器 A：通電！強迫將原始抖動骨架丟進濾波器洗乾淨
                const stableLandmarks = smoothLandmarks(results.poseLandmarks);
                
                // 畫出燙平後的完美紅色骨架點
                for (const landmark of stableLandmarks) {
                    const x = landmark.x * canvasElement.width;
                    const y = landmark.y * canvasElement.height;
                    canvasCtx.beginPath();
                    canvasCtx.arc(x, y, 5, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = '#ff4757';
                    canvasCtx.fill();
                }

                const selectedExercise = exerciseSelector.value;
                let p1, p2, p3;
                if (selectedExercise.includes("Pushup") || selectedExercise.includes("Plank") || selectedExercise.includes("伏地挺身") || selectedExercise.includes("棒式")) {
                    p1 = stableLandmarks[12] || stableLandmarks[11]; 
                    p2 = stableLandmarks[14] || stableLandmarks[13]; 
                    p3 = stableLandmarks[16] || stableLandmarks[15]; 
                } else {
                    p1 = stableLandmarks[24] || stableLandmarks[23]; 
                    p2 = stableLandmarks[26] || stableLandmarks[25]; 
                    p3 = stableLandmarks[28] || stableLandmarks[27]; 
                }

                const currentTime = Date.now();
                if (currentTime - lastAnalysisTime > ANALYSIS_INTERVAL) {
                    lastAnalysisTime = currentTime;

                    const payload = {
                        exercise: selectedExercise,
                        voice_enabled: voiceToggle.checked,
                        shoulder: stableLandmarks[11] ? [stableLandmarks[11].x, stableLandmarks[11].y] : null,
                        hip: p1 ? [p1.x, p1.y] : null,
                        knee: p2 ? [p2.x, p2.y] : null,
                        ankle: p3 ? [p3.x, p3.y] : null
                    };

                    fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.error) return;

                        angleText.innerText = `${data.current_knee_angle}°`;

                        if (data.is_valid) {
                            feedbackText.innerText = "姿勢非常標準，請繼續保持！";
                            feedbackText.style.color = "#2ecc71";
                            statusText.innerText = data.status;
                            statusText.style.color = "#2ecc71";
                            
                            // 🚀 觸發語音阻斷：告訴音響立刻閉嘴改唸「做得好」
                            speakFeedback("標準");
                        } else {
                            feedbackText.innerText = data.feedback;
                            feedbackText.style.color = "#ff4757";
                            statusText.innerText = data.status;
                            statusText.style.color = "#ff4757";
                            
                            if (data.feedback) {
                                speakFeedback(data.feedback);
                            }
                        }

                        // 同步自動辨識動作到選單
                        if (data.exercise_name) {
                            for (let i = 0; i < exerciseSelector.options.length; i++) {
                                if (exerciseSelector.options[i].value.includes(data.exercise_name)) {
                                    if (exerciseSelector.selectedIndex !== i) {
                                        exerciseSelector.selectedIndex = i;
                                    }
                                    break;
                                }
                            }
                        }
                    })
                    .catch(err => console.error("📡 通訊異常:", err));
                }

            } else {
                statusText.innerText = "尋找人體中...";
                statusText.style.color = "#ffff2e";
                angleText.innerText = "--°";
                feedbackText.innerText = "等待偵測數據...";
                feedbackText.style.color = "#00d2d3";
            }
            canvasCtx.restore();
        }

        pauseButton.addEventListener('click', () => {
            isPaused = !isPaused;
            if (isPaused) {
                pauseButton.innerText = "▶️ 恢復偵測";
                pauseButton.className = "btn-pause paused";
                statusText.innerText = "偵測已暫停";
                statusText.style.color = "#ffa502";
            } else {
                pauseButton.innerText = "⏸️ 暫停偵測";
                pauseButton.className = "btn-pause running";
                statusText.innerText = "恢復偵測中...";
                statusText.style.color = "#2ecc71";
            }
        });

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });
        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        pose.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 640,
            height: 480
        });
        camera.start();
    </script>
</body>
</html>
