<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧬 CyberFit AI 身體檔案艙</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: linear-gradient(135deg, #111827 0%, #0f172a 100%);
            border-radius: 20px;
            padding: 35px;
            border: 1px solid #4f46e5;
            box-shadow: 0 0 40px rgba(79, 70, 229, 0.3);
        }
        h2 {
            margin: 0 0 10px 0;
            background: linear-gradient(45deg, #00f2fe, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 26px;
            text-align: center;
            font-weight: 800;
        }
        .subtitle {
            font-size: 13px;
            color: #9ca3af;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 22px;
        }
        label {
            display: block;
            font-size: 14px;
            color: #a5b4fc;
            margin-bottom: 10px;
            font-weight: bold;
        }
        input[type="number"], select {
            width: 100%;
            background: #1f2937;
            border: 1px solid #374151;
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        input[type="number"]:focus, select:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            border: none;
            color: white;
            padding: 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }
        .btn-submit:hover {
            box-shadow: 0 0 25px rgba(124, 58, 237, 0.7);
            transform: translateY(-2px);
        }
        
        /* 🚀 品宸要求：返回主頁按鈕重磅放大加粗 */
        .btn-back {
            display: block;
            text-align: center;
            margin-top: 20px;
            background: #1e293b;
            border: 1px solid #334155;
            color: #f1f5f9;
            padding: 14px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .btn-back:hover {
            background: #334155;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }
        
        #result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px dashed #4f46e5;
            display: none;
        }
        .note-item {
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 8px;
            color: #cbd5e1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🧬 AI 身體素質與健康檔案艙</h2>
        <div class="subtitle">輸入完整數據，由後端大腦啟動多維度運動醫學排課演算法</div>

        <div class="form-group">
            <label>📐 身高 (cm)</label>
            <input type="number" id="profile-height" value="175" min="100" max="250">
        </div>

        <div class="form-group">
            <label>⚖️ 體重 (kg)</label>
            <input type="number" id="profile-weight" value="70" min="30" max="200">
        </div>

        <div class="form-group">
            <label>🎯 運動經驗評估</label>
            <select id="profile-experience">
                <option value="beginner">🔰 運動新手 (建立神經連結、防代償機制開足)</option>
                <option value="advanced">🔥 健身老手 (全動作解禁、解鎖鋼鐵禁區)</option>
            </select>
        </div>

        <div class="form-group">
            <label>⚡ 核心力量感知</label>
            <select id="profile-core">
                <option value="weak">弱 (坐姿容易駝背、棒式難以維持)</option>
                <option value="medium">中 (有運動習慣、核心具備基本張力)</option>
                <option value="strong">強 (具備抗轉體能力、能維持高強度間歇)</option>
            </select>
        </div>

        <button class="btn-submit" onclick="generateAISchedule()">⚙️ 啟動運算並同步課表</button>
        
        <div id="result-box">
            <div style="color: #00f2fe; font-weight: bold; font-size: 14px; margin-bottom: 12px;">✅ 運算成功！AI 處方簽已就位：</div>
            <div id="notes-list"></div>
        </div>

        <a href="/" class="btn-back">⬅️ 安全退出並返回 AI 運動艙主頁</a>
    </div>

    <script>
        function generateAISchedule() {
            const height = document.getElementById('profile-height').value;
            const weight = document.getElementById('profile-weight').value;
            const experience = document.getElementById('profile-experience').value;
            const core_strength = document.getElementById('profile-core').value;

            fetch('/api/ai_generate_schedule', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    height: height,
                    weight: weight,
                    experience: experience,
                    core_strength: core_strength
                })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    const resultBox = document.getElementById('result-box');
                    const notesList = document.getElementById('notes-list');
                    
                    notesList.innerHTML = '';
                    data.notes.forEach(note => {
                        const div = document.createElement('div');
                        div.className = 'note-item';
                        div.innerHTML = note;
                        notesList.appendChild(div);
                    });
                    
                    resultBox.style.display = 'block';
                    
                    const utterance = new SpeechSynthesisUtterance("智慧課表已成功投射至主畫面");
                    utterance.lang = 'zh-TW';
                    window.speechSynthesis.speak(utterance);
                }
            });
        }
    </script>
</body>
</html>
